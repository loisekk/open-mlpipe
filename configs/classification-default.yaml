# Classification — Heart Disease Detection
# Usage: mlpipe run --config configs/classification-default.yaml

project: heart-disease
task: auto
level: 2

data:
  path: test_datasets/heart_disease.csv
  target: target
  test_size: 0.2
  random_state: 42
  stratify: true

cleaning:
  remove_duplicates: true
  missing_strategy: auto
  outlier_method: auto

feature_engineering:
  auto_interactions: false
  auto_log: false
  datetime_features: true
  missingness_flags: true

model_selection:
  candidates: [lightgbm, xgboost, random_forest, logistic_regression]
  scoring: [f1, roc_auc, accuracy]
  ranking_primary: f1
  cross_validation:
    n_splits: 5
    strategy: stratified_kfold

tuning:
  enabled: true
  engine: optuna
  n_trials: 30
  timeout: 600

feature_selection:
  enabled: true
  method: shap_importance
  min_importance: 0.01

evaluation:
  explainability: true
  shap_plots: [summary, dependence]

deployment:
  enabled: false
